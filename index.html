<script>
(function(){
  // Generate icon via canvas and inject as apple-touch-icon
  const c=document.createElement("canvas");c.width=180;c.height=180;
  const ctx=c.getContext("2d");
  const g=ctx.createLinearGradient(0,0,180,180);
  g.addColorStop(0,"#38bdf8");g.addColorStop(1,"#818cf8");
  ctx.fillStyle=g;ctx.roundRect(0,0,180,180,36);ctx.fill();
  ctx.font="bold 100px serif";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText("💪",90,95);
  const url=c.toDataURL("image/png");
  const l=document.createElement("link");l.rel="apple-touch-icon";l.href=url;
  document.head.appendChild(l);

  // Build manifest
  const manifest={
    name:"FitIndia Pro",short_name:"FitIndia",
    description:"Diet + Workout tracker for India",
    start_url:"./",display:"standalone",
    background_color:"#0a0f1a",theme_color:"#0a0f1a",
    orientation:"portrait",
    icons:[
      {src:url,sizes:"180x180",type:"image/png",purpose:"any maskable"},
      {src:url,sizes:"192x192",type:"image/png"},
      {src:url,sizes:"512x512",type:"image/png"},
    ]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
  const mUrl=URL.createObjectURL(blob);
  const ml=document.createElement("link");ml.rel="manifest";ml.href=mUrl;
  document.head.appendChild(ml);
})();
</script>

function toDateKey(d){return d.toISOString().split("T")[0];}
function calcBMR(w,h,a,g){return g==="male"?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;}
function calcBMI(w,h){return +(w/((h/100)**2)).toFixed(1);}
function bmiCat(b){return b<18.5?"Underweight":b<25?"Normal":b<30?"Overweight":"Obese";}
function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch{return null;}}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}}
function genPlan(profile){
  const rest=parseInt(profile.restDays)||2,work=7-rest;
  const sp=SPLIT_PLANS[profile.split]||SPLIT_PLANS.fullbody;
  const wt=profile.workoutEnv||"home";
  const names=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const sched=[];let wi=0;
  for(let d=0;d<7;d++){
    if(d>=work){sched.push({day:names[d],type:"Rest",exercises:[]});continue;}
    const sess=sp.days[wi%sp.days.length];
    const mgs=sp.map[sess]||[];
    const exs=[];
    mgs.forEach(mg=>(EXERCISES[mg]||[]).filter(e=>e.type.includes(wt)).slice(0,3).forEach(e=>exs.push({...e,muscle:mg})));
    sched.push({day:names[d],type:sess,exercises:exs.slice(0,8)});wi++;
  }
  return{splitName:sp.name,schedule:sched};
}

              React.createElement("div",{style:{fontSize:12,fontWeight:700,color:T.text}},`${new Date(dk+"T00:00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short"})}${dk===today?" (Today)":""}`),
              React.createElement("div",{style:{fontSize:11,color:d.workoutDone?"#22c55e":T.muted}},d.workoutDone?"✅ Done":"😴 Rest")
            ),
            wl.length>0&&React.createElement(React.Fragment,{},
              React.createElement("div",{style:{fontSize:11,color:T.muted}},`${wl.length} exercises · ${wl.reduce((s,e)=>s+e.sets.length,0)} sets${d.burned?` · 🔥${d.burned}kcal`:""}`),
              React.createElement("div",{style:{fontSize:11,color:T.muted,marginTop:3}},`${wl.slice(0,3).map(e=>e.name).join(", ")}${wl.length>3?` +${wl.length-3} more`:""}`)
            )
          );})
        )
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
